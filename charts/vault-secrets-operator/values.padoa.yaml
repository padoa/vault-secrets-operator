replicaCount: 2

# Leader-election lease timings. Longer than the controller-runtime defaults
# (15s/10s/2s) to cut writes to the leader-election lease. The leader renews
# (writes) once per retryPeriod, so 10s yields ~6 writes/min instead of ~30.
# Failover to the standby replica takes up to leaseDuration (~1 min).
leaderElection:
  leaseDuration: 60s
  renewDeadline: 40s
  retryPeriod: 10s

# Padoa cost-allocation labels applied to the operator pods.
podLabels:
  costs.padoa.fr/client: undefined
  costs.padoa.fr/component: infra.vault-secrets-operator

# override this on some envs
resources:
  limits:
    memory: 512Mi
  requests:
    memory: 128Mi
    cpu: 50m

vault:
  address: https://vault.padoa.fr
  authMethod: azure
  azureScaleset: true
  reconciliationTime: 1800
  # The maxConcurrentReconciles value determines the maximum number of concurrent
  # reconcile operations for VaultSecret resources. Higher is faster, but can cause
  # more load on Vault server and AKS API server.
  maxConcurrentReconciles: 3

image:
  repository: padoa.azurecr.io/padoa-tools/vault-secrets-operator
  tag: master
  pullPolicy: Always

# ServiceMonitor lives in the monitoring chart (monitoring/core) instead of here,
# so the VSO ArgoCD app has no dependency on the prometheus-operator (monitoring.coreos.com)
# CRDs and can sync before monitoring. This breaks the ArgoCD CRD sync-ordering cycle.
serviceMonitor:
  enabled: false

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - vault-secrets-operator
        topologyKey: "kubernetes.io/hostname"
